name = "grocery-price-tracker-api"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Serve the built Vite PWA (apps/web/dist) as static assets from this same
# Worker, so the site and the /api/* backend share one origin (and the web's
# relative /api calls just work). Assets are matched first; any path with no
# matching file (i.e. /api/*) falls through to the Worker below.
[assets]
directory = "../web/dist"

# Daily scrape is now driven from a residential IP (scripts/scrape-local.ts via
# launchd) because the retailers' bot protection blocks Cloudflare's Worker
# egress (403/503). The edge cron is disabled so there's a single writer — no
# race on price_history rows and no daily failure noise. Re-enable only if you
# revert to edge scraping. Requires a redeploy to take effect.
# [triggers]
# crons = ["15 5 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "grocery-prices"
database_id = "790a2365-b5fe-44c9-91fa-cd383f1daa96"
